AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Game Plan OS - an AI operations officer that turns task chaos into a
  one-page daily game plan, in the spirit of the military five-paragraph
  operations order, and debriefs you every evening so tomorrow's plan is
  smarter. Weekend Productivity Challenge entry.

Parameters:
  NotifyEmail:
    Type: String
    Description: SES-verified email that receives the morning game plan (also used as sender and failure-alarm target).
  ApiKey:
    Type: String
    NoEcho: true
    Description: Shared secret required in the x-sitrep-key header for all API calls.
  NovaProModelId:
    Type: String
    Default: us.amazon.nova-pro-v1:0
    Description: >
      Bedrock model/inference-profile ID for game plan generation and debrief analysis.
      VERIFY the current ID before deploy: aws bedrock list-inference-profiles
  NovaLiteModelId:
    Type: String
    Default: us.amazon.nova-lite-v1:0
    Description: Bedrock model/inference-profile ID for cheap/fast task triage.
  SitrepHourLocal:
    Type: String
    Default: '30 5'
    Description: 'cron minute+hour for the morning plan in LOCAL time (default 05:30).'
  TimeZone:
    Type: String
    Default: America/Chicago
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: 'https://gameplan.altivum.ai,https://main.dpg1b347fl82l.amplifyapp.com,http://localhost:5173,http://localhost:4173'
    Description: Browser origins allowed by CORS (the Amplify app plus local dev servers).
  TelegramBotToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: BotFather token for the Telegram channel. Empty disables Telegram entirely.
  TelegramChatId:
    Type: String
    Default: ''
    Description: Single allowed Telegram chat id (the owner). Empty means unclaimed; the webhook replies with the caller's chat id so the owner can claim it.
  TelegramWebhookSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: Secret token Telegram echoes in X-Telegram-Bot-Api-Secret-Token on webhook calls.

Globals:
  Function:
    Runtime: python3.13
    Timeout: 120
    MemorySize: 512
    Environment:
      Variables:
        TABLE_NAME: !Ref SitrepTable
        NOTIFY_EMAIL: !Ref NotifyEmail
        NOVA_PRO_MODEL_ID: !Ref NovaProModelId
        NOVA_LITE_MODEL_ID: !Ref NovaLiteModelId
        USER_ID: primary
        LOCAL_TZ: !Ref TimeZone

Resources:

  SitrepTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SitrepHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowHeaders:
          - content-type
          - x-sitrep-key
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS

  # Strands Agents SDK and its dependencies, vendored as a layer so the
  # functions keep deploying straight from source with plain `sam deploy`.
  # Populate backend/layer/python with scripts/build-agent-layer.sh first.
  AgentDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: gameplan-os-agent-deps
      Description: Strands Agents SDK dependencies for the conversational agent (built by scripts/build-agent-layer.sh).
      ContentUri: backend/layer/
      CompatibleRuntimes:
        - python3.13
      RetentionPolicy: Delete

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Game Plan OS REST API - tasks, on-demand plan generation, debrief loop, conversational agent.
      CodeUri: backend/src/
      Handler: handlers.api.handler
      # The agent layer makes cold starts import-heavy; memory buys CPU.
      MemorySize: 1024
      Layers:
        - !Ref AgentDependenciesLayer
      LoggingConfig:
        LogGroup: !Ref ApiFunctionLogs
      Environment:
        Variables:
          API_KEY: !Ref ApiKey
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
          TELEGRAM_WEBHOOK_SECRET: !Ref TelegramWebhookSecret
      Events:
        AnyRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SitrepHttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SitrepTable
        - SESCrudPolicy:
            IdentityName: !Ref NotifyEmail
        - Statement:
            - Effect: Allow
              Action:
                # The Strands agent may call ConverseStream, which needs the
                # streaming action even when our own code path does not.
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/${NovaProModelId}'
                - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/${NovaLiteModelId}'
                - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/amazon.nova-*'

  ApiFunctionLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /gameplan-os/api
      RetentionInDays: 30

  MorningBriefFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Scheduled morning game plan - generates the day's plan and emails it.
      CodeUri: backend/src/
      Handler: handlers.scheduled_sitrep.handler
      Timeout: 180
      Environment:
        Variables:
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
      LoggingConfig:
        LogGroup: !Ref MorningBriefFunctionLogs
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 3600
        MaximumRetryAttempts: 2
      Events:
        MorningBrief:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: !Sub 'cron(${SitrepHourLocal} * * ? *)'
            ScheduleExpressionTimezone: !Ref TimeZone
            Description: Daily 0530 local - generate and deliver the morning game plan.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SitrepTable
        - SESCrudPolicy:
            IdentityName: !Ref NotifyEmail
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/${NovaProModelId}'
                - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/${NovaLiteModelId}'
                - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/amazon.nova-*'

  MorningBriefFunctionLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /gameplan-os/morning-brief
      RetentionInDays: 30

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: gameplan-os-alerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref NotifyEmail

  MorningBriefErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: The morning game plan failed to generate or send. Check the MorningBriefFunction logs.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref MorningBriefFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  ApiUrl:
    Description: Base URL for the Game Plan OS API (set as VITE_API_URL in the frontend).
    Value: !Sub 'https://${SitrepHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  TableName:
    Value: !Ref SitrepTable
